name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (base-href for project Pages)
        run: npm run build -- --base-href=/libya-digital-memory/
      - name: SPA deep-link fallback (404 -> index)
        run: |
          cp dist/libya-digital-memory/browser/index.html dist/libya-digital-memory/browser/404.html
          touch dist/libya-digital-memory/browser/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/libya-digital-memory/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
